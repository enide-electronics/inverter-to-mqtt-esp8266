name: Build and Release Firmware

on:
  release:
    types: [created, published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - wemos_d1_mini_4m
          - esp01_1m

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run --environment ${{ matrix.environment }}

      - name: Stage firmware artifacts
        run: |
          mkdir -p artifacts
          cp ".pio/build/${{ matrix.environment }}/firmware.bin" \
             "artifacts/firmware-${{ matrix.environment }}.bin"
          if [ -f ".pio/build/${{ matrix.environment }}/firmware.elf" ]; then
            cp ".pio/build/${{ matrix.environment }}/firmware.elf" \
               "artifacts/firmware-${{ matrix.environment }}.elf"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.environment }}
          path: artifacts/*
          if-no-files-found: error

      - name: Attach firmware to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/firmware-${{ matrix.environment }}.bin
